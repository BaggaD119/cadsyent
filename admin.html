<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadsy Brown Entertainment | Admin</title>
    <meta
      name="description"
      content="Cadsy Brown Entertainment admin panel for updating homepage text, images, and contact details."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-body">
    <main class="admin-main">
      <section class="admin-panel">
        <div class="admin-head">
          <div>
            <p class="admin-overline">Cadsy Brown Entertainment CMS</p>
            <h1>Admin Dashboard</h1>
            <p class="admin-note">
              Update homepage text, links, photos, and contact details. Changes
              sync to Supabase after admin sign-in.
            </p>
          </div>
          <div class="admin-head-actions">
            <a href="index.html" class="admin-link">View Website</a>
          </div>
        </div>

        <section class="admin-auth" id="admin-auth">
          <h2>Admin Login</h2>
          <form
            id="admin-auth-form"
            class="admin-auth-form"
            onsubmit="return false;"
          >
            <input
              id="admin-email"
              type="email"
              class="admin-input"
              placeholder="Admin email"
              required
            />
            <input
              id="admin-password"
              type="password"
              class="admin-input"
              placeholder="Password"
              required
            />
            <button
              type="submit"
              id="admin-signin"
              class="admin-btn admin-btn-primary"
            >
              Sign In
            </button>
            <button type="button" id="admin-reset-password" class="admin-btn">
              Reset Password
            </button>
            <button
              type="button"
              id="admin-signout"
              class="admin-btn admin-btn-secondary"
            >
              Sign Out
            </button>
          </form>
        </section>

        <form id="admin-form" class="admin-form" novalidate>
          <div class="admin-layout">
            <aside class="admin-sidebar" aria-label="Edit categories">
              <h2>Categories</h2>
              <div id="admin-categories" class="admin-categories"></div>
            </aside>
            <section class="admin-editor">
              <h2 id="admin-section-title"></h2>
              <div id="admin-fields" class="admin-sections"></div>
            </section>
          </div>
          <div class="admin-actions">
            <button type="submit" class="admin-btn admin-btn-primary">
              Save Changes
            </button>
            <button
              type="button"
              id="admin-reset"
              class="admin-btn admin-btn-secondary"
            >
              Reset to Default
            </button>
          </div>
        </form>
        <p id="admin-status" class="admin-status" aria-live="polite"></p>
      </section>
    </main>

    <script src="supabase-config.js?v=20260408d"></script>
    <script src="cms.js?v=20260408d"></script>
    <script src="admin.js?v=20260408d"></script>
  </body>
</html>
